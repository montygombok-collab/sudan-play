<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المطورين - Sudan Play</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --input-bg: #090d16;
            --border-color: #334155;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dev-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        h2 {
            margin-top: 0;
            color: var(--text-main);
            text-align: center;
            font-size: 24px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 14px;
        }

        input[type="text"], 
        textarea, 
        select {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, 
        textarea:focus, 
        select:focus {
            border-color: var(--primary);
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        .btn-publish {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        .btn-publish:hover {
            background-color: var(--primary-hover);
        }

        .btn-publish:active {
            transform: scale(0.98);
        }

        #resultBox {
            margin-top: 25px;
            background-color: var(--input-bg);
            border: 1px dashed var(--success);
            padding: 15px;
            border-radius: 8px;
            display: none;
            text-align: center;
        }

        #resultBox h4 {
            color: var(--success);
            margin: 0 0 10px 0;
        }

        .generated-link {
            word-break: break-all;
            color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
            padding: 8px;
            border-radius: 6px;
            display: inline-block;
            margin-top: 5px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="dev-container">
        <h2>لوحة رفع ونشر التطبيقات</h2>
        
        <form id="devForm" onsubmit="event.preventDefault(); generateApp();">
            <div class="form-group">
                <label for="appName">اسم التطبيق:</label>
                <input type="text" id="appName" placeholder="مثال: سودان شات" required>
            </div>

            <div class="form-group">
                <label for="appCategory">تصنيف التطبيق:</label>
                <select id="appCategory">
                    <option value="tools">أدوات وتقنيات</option>
                    <option value="games">ألعاب</option>
                    <option value="social">تواصل اجتماعي</option>
                    <option value="education">تعليم</option>
                </select>
            </div>

            <div class="form-group">
                <label for="appDesc">وصف التطبيق:</label>
                <textarea id="appDesc" placeholder="اكتب نبذة مختصرة عن مميزات التطبيق..." required></textarea>
            </div>

            <div class="form-group">
                <label for="appIcon">رابط الأيقونة (من Google Drive):</label>
                ضع رابط مشاركة الصورة المباشر هنا
                <input type="text" id="appIcon" placeholder="https://drive.google.com/uc?export=view&id=..." required>
            </div>

            <div class="form-group">
                <label for="apkLink">رابط تحميل ملف الـ APK (من Google Drive):</label>
                ضع رابط مشاركة ملف الـ APK هنا
                <input type="text" id="apkLink" placeholder="https://drive.google.com/uc?export=download&id=..." required>
            </div>

            <button type="submit" class="btn-publish">توليد ونشر التطبيق فوراً</button>
        </form>

        <div id="resultBox">
            <h4>تم نشر التطبيق بنجاح! 🎉</h4>
            <p>رابط صفحة تطبيقك الخاص:</p>
            <a href="#" id="finalLink" class="generated-link" target="_blank">رابط التطبيق</a>
        </div>
    </div>

    <script>
        function generateApp() {
            const name = document.getElementById('appName').value;
            const category = document.getElementById('appCategory').value;
            const desc = document.getElementById('appDesc').value;
            const icon = document.getElementById('appIcon').value;
            const apk = document.getElementById('apkLink').value;

            // توليد معرف فريد يعتمد على الوقت واسم التطبيق
            const appId = 'app_' + Date.now();

            // تجهيز كائن البيانات لتخزينه (يمكن ربطه لاحقاً بقاعدة بيانات أو LocalStorage)
            const appData = {
                id: appId,
                name: name,
                category: category,
                description: desc,
                iconUrl: icon,
                apkUrl: apk,
                date: new Date().toLocaleDateString()
            };

            // حفظ مؤقت في المتصفح كمحاكاة لقاعدة البيانات لكي يقرأه المتجر العام
            let allApps = JSON.parse(localStorage.getItem('sudanPlayApps')) || [];
            allApps.push(appData);
            localStorage.setItem('sudanPlayApps', JSON.stringify(allApps));

            // توليد الرابط الخاص بالتطبيق
            const generatedUrl = `app-view.html?id=${appId}`;
            
            // إظهار النتيجة للمطور
            const resultBox = document.getElementById('resultBox');
            const finalLink = document.getElementById('finalLink');
            
            finalLink.href = generatedUrl;
            finalLink.textContent = window.location.origin + '/' + generatedUrl;
            resultBox.style.display = 'block';

            // تفريغ النموذج بعد النجاح
            document.getElementById('devForm').reset();
        }
    </script>
</body>
</html>
