<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer Interface - Advanced Liquid Glass Environment</title>
  <style>
    /* ----------------------------------------------------
       1. إعادة ضبط الأساسيات (Reset & Base Styles)
    ---------------------------------------------------- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: #090d16;
      overflow-x: hidden;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
    }

    /* ----------------------------------------------------
       2. شريط المطورين بالأعلى فقط (Dev Console Header)
    ---------------------------------------------------- */
    .dev-header {
      width: 100%;
      background: rgba(15, 23, 42, 0.75);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      position: fixed;
      top: 0;
      left: 0;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    .dev-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dev-badge {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      box-shadow: 0 0 12px rgba(37, 99, 235, 0.4);
    }

    .dev-stats {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.85rem;
      color: #94a3b8;
      display: flex;
      gap: 15px;
    }

    .dev-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .dev-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #38bdf8;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .dev-btn:hover {
      background: #38bdf8;
      color: #0f172a;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
      transform: translateY(-1px);
    }

    /* ----------------------------------------------------
       3. خلفية السوائل المتحركة (Liquid Fluid Blobs)
    ---------------------------------------------------- */
    .background-canvas {
      position: fixed;
      width: 100vw;
      height: 100vh;
      top: 0;
      left: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.6;
      animation: fluidMove 14s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
    }

    .blob-1 {
      width: 380px;
      height: 380px;
      background: #3b82f6;
      top: 10%;
      left: 15%;
    }

    .blob-2 {
      width: 420px;
      height: 420px;
      background: #8b5cf6;
      bottom: 10%;
      right: 15%;
      animation-delay: -5s;
    }

    .blob-3 {
      width: 300px;
      height: 300px;
      background: #ec4899;
      top: 35%;
      right: 30%;
      animation-delay: -9s;
    }

    @keyframes fluidMove {
      0% {
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
      50% {
        transform: translate(100px, -60px) scale(1.15) rotate(180deg);
      }
      100% {
        transform: translate(-50px, 80px) scale(0.9) rotate(360deg);
      }
    }

    /* ----------------------------------------------------
       4. واجهة بطاقة الزجاج السائل (Liquid Glass Card)
    ---------------------------------------------------- */
    .main-container {
      position: relative;
      z-index: 10;
      padding: 20px;
      width: 100%;
      max-width: 520px;
      margin-top: 50px;
    }

    .liquid-glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-top: 1px solid rgba(255, 255, 255, 0.4);
      border-left: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 32px;
      padding: 45px 35px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5),
                  inset 0 1px 2px rgba(255, 255, 255, 0.5);
      transition: transform 0.15s ease-out, box-shadow 0.3s ease;
      transform-style: preserve-3d;
      position: relative;
      overflow: hidden;
    }

    /* لمعة الضوء الانكسارية فوق الزجاج */
    .liquid-glass-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 60%);
      pointer-events: none;
      transform: rotate(30deg);
    }

    .glass-title {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #ffffff 40%, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .glass-desc {
      color: #cbd5e1;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 30px;
    }

    .status-box {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 16px;
      padding: 16px 20px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.85rem;
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.2);
      line-height: 1.6;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    /* موجات الماء عند الضغط على الزجاج */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: scale(0);
      animation: rippleEffect 0.6s linear;
      pointer-events: none;
    }

    @keyframes rippleEffect {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <!-- شريط المطورين في الأعلى فقط -->
  <header class="dev-header">
    <div class="dev-brand">
      <span class="dev-badge">Dev Engine</span>
      <div class="dev-stats">
        <span>FPS: <strong id="fps-counter" style="color: #4ade80;">60</strong></span>
        <span>Render: <strong style="color: #38bdf8;">GPU</strong></span>
      </div>
    </div>
    
    <div class="dev-controls">
      <button class="dev-btn" onclick="togglePhysics()">تسريع السائل</button>
      <button class="dev-btn" onclick="toggleBlurMode()">تبديل الضبابية</button>
      <button class="dev-btn" onclick="resetCard()">إعادة ضبط</button>
    </div>
  </header>

  <!-- خلفية السوائل Dynamic Liquid Blobs -->
  <div class="background-canvas">
    <div class="blob blob-1" id="b1"></div>
    <div class="blob blob-2" id="b2"></div>
    <div class="blob blob-3" id="b3"></div>
  </div>

  <!-- بطاقة الزجاج السائل Main Liquid Card -->
  <main class="main-container">
    <div class="liquid-glass-card" id="glassCard">
      <h2 class="glass-title">تأثير الزجاج السائل</h2>
      <p class="glass-desc">
        تجربة تفاعلية تمزج بين محاكاة حركة السوائل والانكسار الضوئي للزجاج ثلاثي الأبعاد. حرك المؤشر أو اضغط لتوليد تموجات زجاجية.
      </p>
      <div class="status-box">
        &gt; Liquid Physics: Interactive<br>
        &gt; Backdrop Blur: 24px (Saturate 200%)<br>
        &gt; Dev Interface: Active On Top
      </div>
    </div>
  </main>

  <script>
    // ----------------------------------------------------
    // 1. حركة الانكسار ثلاثية الأبعاد (3D Parallax Tilt)
    // ----------------------------------------------------
    const card = document.getElementById('glassCard');

    document.addEventListener('mousemove', (e) => {
      const xAxis = (window.innerWidth / 2 - e.pageX) / 22;
      const yAxis = (window.innerHeight / 2 - e.pageY) / 22;
      card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    document.addEventListener('mouseleave', () => {
      card.style.transform = `rotateY(0deg) rotateX(0deg)`;
    });

    // ----------------------------------------------------
    // 2. تأثير تموج الماء عند الضغط (Liquid Ripple Effect)
    // ----------------------------------------------------
    card.addEventListener('click', function (e) {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const ripple = document.createElement('span');
      ripple.classList.add('ripple');
      ripple.style.left = `${x}px`;
      ripple.style.top = `${y}px`;
      ripple.style.width = ripple.style.height = `${Math.max(rect.width, rect.height)}px`;

      this.appendChild(ripple);

      setTimeout(() => {
        ripple.remove();
      }, 600);
    });

    // ----------------------------------------------------
    // 3. أدوات المطورين في الأعلى (Dev Controls Functions)
    // ----------------------------------------------------
    let isFast = false;
    function togglePhysics() {
      const blobs = document.querySelectorAll('.blob');
      isFast = !isFast;
      blobs.forEach(b => {
        b.style.animationDuration = isFast ? '3s' : '14s';
      });
    }

    let isBlurHigh = true;
    function toggleBlurMode() {
      isBlurHigh = !isBlurHigh;
      const blurVal = isBlurHigh ? 'blur(24px) saturate(200%)' : 'blur(4px) saturate(100%)';
      card.style.backdropFilter = blurVal;
      card.style.webkitBackdropFilter = blurVal;
    }

    function resetCard() {
      card.style.transform = `rotateY(0deg) rotateX(0deg)`;
      if (!isBlurHigh) toggleBlurMode();
      if (isFast) togglePhysics();
    }

    // ----------------------------------------------------
    // 4. مادي المحاكاة لحساب FPS (Frames Per Second)
    // ----------------------------------------------------
    let lastTime = performance.now();
    let frameCount = 0;
    const fpsDisplay = document.getElementById('fps-counter');

    function calculateFPS() {
      const now = performance.now();
      frameCount++;
      if (now - lastTime >= 1000) {
        fpsDisplay.textContent = frameCount;
        frameCount = 0;
        lastTime = now;
      }
      requestAnimationFrame(calculateFPS);
    }
    requestAnimationFrame(calculateFPS);
  </script>

</body>
</html>
